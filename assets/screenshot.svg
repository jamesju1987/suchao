  <text x="34" y="704" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="34" font-weight="800">一页看全苏超多场直播</text>
  <text x="34" y="748" fill="#9aa89d" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="22">输入起始场次，选择 1 / 2 / 3 / 4 / 6 场，自动排版，完整显示与区域填满一键切换。</text>
  <rect x="34" y="790" width="210" height="52" rx="9" fill="#f2c14e"/>
  <text x="68" y="824" fill="#1d1300" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="20" font-weight="800">打开即用</text>
  <rect x="264" y="790" width="242" height="52" rx="9" fill="#17231d" stroke="#ffffff" opacity="0.95"/>
  <text x="296" y="824" fill="#fff" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="20">支持 GitHub Pages</text>
