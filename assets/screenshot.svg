<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="苏超多路直播墙界面预览">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#06100b"/>
      <stop offset="0.48" stop-color="#0a1812"/>
      <stop offset="1" stop-color="#111413"/>
    </linearGradient>
    <linearGradient id="field" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1f6b3e"/>
      <stop offset="1" stop-color="#114c31"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <circle cx="160" cy="40" r="360" fill="#f2c14e" opacity="0.12"/>

  <rect x="0" y="0" width="1440" height="88" fill="#07110c" opacity="0.94"/>
