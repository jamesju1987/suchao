      <text x="50" y="30" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="17" font-weight="700">第 2 路</text>
      <rect x="0" y="48" width="432" height="180" fill="url(#field)"/>
      <line x1="216" y1="48" x2="216" y2="228" stroke="#ffffff" opacity="0.35"/>
      <circle cx="216" cy="138" r="42" fill="none" stroke="#ffffff" opacity="0.35"/>
    </g>
    <g transform="translate(980 118)">
      <rect width="432" height="228" rx="8" fill="#050806" stroke="#ffffff" opacity="0.88"/>
      <rect width="432" height="48" rx="8" fill="#17231d"/>
      <circle cx="24" cy="24" r="12" fill="#f2c14e"/>
      <text x="20" y="29" fill="#1d1300" font-family="Arial" font-size="14" font-weight="700">3</text>
      <text x="50" y="30" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="17" font-weight="700">第 3 路</text>
      <rect x="0" y="48" width="432" height="180" fill="url(#field)"/>
      <line x1="216" y1="48" x2="216" y2="228" stroke="#ffffff" opacity="0.35"/>
      <circle cx="216" cy="138" r="42" fill="none" stroke="#ffffff" opacity="0.35"/>
    </g>
    <g transform="translate(28 386)">
      <rect width="432" height="228" rx="8" fill="#050806" stroke="#ffffff" opacity="0.88"/>
      <rect width="432" height="48" rx="8" fill="#17231d"/>
      <circle cx="24" cy="24" r="12" fill="#f2c14e"/>
      <text x="20" y="29" fill="#1d1300" font-family="Arial" font-size="14" font-weight="700">4</text>
      <text x="50" y="30" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="17" font-weight="700">第 4 路</text>
      <rect x="0" y="48" width="432" height="180" fill="url(#field)"/>
      <line x1="216" y1="48" x2="216" y2="228" stroke="#ffffff" opacity="0.35"/>
      <circle cx="216" cy="138" r="42" fill="none" stroke="#ffffff" opacity="0.35"/>
    </g>
    <g transform="translate(504 386)">
      <rect width="432" height="228" rx="8" fill="#050806" stroke="#ffffff" opacity="0.88"/>
      <rect width="432" height="48" rx="8" fill="#17231d"/>
      <circle cx="24" cy="24" r="12" fill="#f2c14e"/>
      <text x="20" y="29" fill="#1d1300" font-family="Arial" font-size="14" font-weight="700">5</text>
      <text x="50" y="30" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="17" font-weight="700">第 5 路</text>
      <rect x="0" y="48" width="432" height="180" fill="url(#field)"/>
      <line x1="216" y1="48" x2="216" y2="228" stroke="#ffffff" opacity="0.35"/>
      <circle cx="216" cy="138" r="42" fill="none" stroke="#ffffff" opacity="0.35"/>
    </g>
    <g transform="translate(980 386)">
      <rect width="432" height="228" rx="8" fill="#050806" stroke="#ffffff" opacity="0.88"/>
      <rect width="432" height="48" rx="8" fill="#17231d"/>
      <circle cx="24" cy="24" r="12" fill="#f2c14e"/>
      <text x="20" y="29" fill="#1d1300" font-family="Arial" font-size="14" font-weight="700">6</text>
      <text x="50" y="30" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="17" font-weight="700">第 6 路</text>
      <rect x="0" y="48" width="432" height="180" fill="url(#field)"/>
      <line x1="216" y1="48" x2="216" y2="228" stroke="#ffffff" opacity="0.35"/>
      <circle cx="216" cy="138" r="42" fill="none" stroke="#ffffff" opacity="0.35"/>
