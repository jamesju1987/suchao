  <text x="34" y="53" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="28" font-weight="700">苏超多路直播墙</text>
  <text x="278" y="53" fill="#9aa89d" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="17">当前轮次 200，6 场完整显示</text>

  <rect x="786" y="22" width="142" height="44" rx="7" fill="#0b100d" stroke="#ffffff" opacity="0.95"/>
  <text x="806" y="50" fill="#9aa89d" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="15">起始</text>
  <text x="858" y="50" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="15">41</text>

  <rect x="942" y="22" width="90" height="44" rx="7" fill="#0b100d" stroke="#ffffff" opacity="0.95"/>
  <text x="962" y="50" fill="#9aa89d" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="15">场数</text>
  <text x="1006" y="50" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="15">6</text>

  <rect x="1018" y="22" width="106" height="44" rx="7" fill="#0b100d" stroke="#ffffff" opacity="0.95"/>
  <text x="1038" y="50" fill="#9aa89d" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="15">轮次</text>
  <text x="1082" y="50" fill="#f6f8f3" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="15">200</text>

  <rect x="1138" y="22" width="76" height="44" rx="7" fill="#f2c14e"/>
  <text x="1160" y="50" fill="#1d1300" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="16" font-weight="700">应用</text>
  <rect x="1226" y="22" width="96" height="44" rx="7" fill="#d73f31"/>
  <text x="1244" y="50" fill="#fff" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="16">自动网格</text>
  <rect x="1334" y="22" width="72" height="44" rx="7" fill="#17231d" stroke="#ffffff" opacity="0.95"/>
  <text x="1354" y="50" fill="#fff" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="16">纵向</text>

  <g filter="url(#shadow)">
    <g transform="translate(28 118)">
      <rect width="432" height="228" rx="8" fill="#050806" stroke="#f2c14e"/>
