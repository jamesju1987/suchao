      <rect x="0" y="48" width="432" height="180" fill="url(#field)"/>
      <line x1="216" y1="48" x2="216" y2="228" stroke="#ffffff" opacity="0.35"/>
      <circle cx="216" cy="138" r="42" fill="none" stroke="#ffffff" opacity="0.35"/>
      <rect x="16" y="62" width="400" height="152" rx="4" fill="#000" opacity="0.12"/>
      <text x="22" y="208" fill="#fff" font-family="Arial,'Microsoft YaHei',sans-serif" font-size="13">完整显示直播画面</text>
