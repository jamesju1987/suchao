<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>苏超多路直播墙</title>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NZ6N8W92YL"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());
      gtag("config", "G-NZ6N8W92YL");
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg: #07110c;
        --panel: #101814;
        --panel-strong: #17231d;
        --line: rgba(255, 255, 255, 0.14);
        --line-strong: rgba(255, 255, 255, 0.26);
        --text: #f6f8f3;
        --muted: #9aa89d;
        --accent: #f2c14e;
        --accent-2: #d73f31;
        --field: #0b100d;
        --good: #42d692;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        min-width: 320px;
        background:
          radial-gradient(circle at 12% 0%, rgba(242, 193, 78, 0.15), transparent 28rem),
          linear-gradient(135deg, #06100b 0%, #0a1812 44%, #111413 100%);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "Microsoft YaHei", sans-serif;
        overflow: hidden;
      }

      body > :not(.app)[class*="download" i],
      body > :not(.app)[class*="appdown" i],
      body > :not(.app)[class*="app-down" i],
      body > :not(.app)[class*="openapp" i],
      body > :not(.app)[class*="open-app" i],
      body > :not(.app)[id*="download" i],
      body > :not(.app)[id*="appdown" i],
      body > :not(.app)[id*="openapp" i] {
        display: none !important;
        height: 0 !important;
        min-height: 0 !important;
        overflow: hidden !important;
      }

      button,
      input,
      select {
        font: inherit;
      }

      button {
        border: 0;
        color: inherit;
        cursor: pointer;
      }

      .app {
        height: 100%;
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: grid;
        grid-template-columns: minmax(13rem, 1fr) auto;
        gap: 0.75rem;
        align-items: center;
        padding: 0.75rem;
        background: rgba(7, 17, 12, 0.92);
        border-bottom: 1px solid var(--line);
        backdrop-filter: blur(16px);
      }

      .brand {
        min-width: 0;
        display: flex;
        align-items: baseline;
        gap: 0.75rem;
      }

      .brand h1 {
        margin: 0;
        font-size: clamp(1rem, 2vw, 1.35rem);
        letter-spacing: 0;
        white-space: nowrap;
      }

      .status {
        color: var(--muted);
        font-size: 0.82rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .controls {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 0.5rem;
        flex-wrap: wrap;
      }

      .field {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        height: 2.3rem;
        padding: 0 0.65rem;
        border: 1px solid var(--line);
        border-radius: 0.45rem;
        background: var(--field);
      }

      .field span {
        color: var(--muted);
        font-size: 0.78rem;
        white-space: nowrap;
      }

      .field input {
        width: 10.8rem;
        border: 0;
        outline: 0;
        color: var(--text);
        background: transparent;
      }

      .field.source-field input {
        width: min(34rem, 42vw);
      }

      .advanced-field {
        display: none;
      }

      .field select {
        border: 0;
        outline: 0;
        color: var(--text);
        background: transparent;
      }

      .btn,
      .icon-btn {
        height: 2.3rem;
        border-radius: 0.45rem;
        background: var(--panel-strong);
        border: 1px solid var(--line);
        transition:
          border-color 150ms ease,
          background 150ms ease,
          transform 150ms ease;
      }

      .btn {
        padding: 0 0.85rem;
        white-space: nowrap;
      }

      .icon-btn {
        width: 2.45rem;
        display: inline-grid;
        place-items: center;
      }

      .btn:hover,
      .icon-btn:hover {
        border-color: var(--line-strong);
        background: #223028;
      }

      .btn:active,
      .icon-btn:active {
        transform: translateY(1px);
      }

      .btn.primary {
        color: #1d1300;
        background: var(--accent);
        border-color: rgba(242, 193, 78, 0.88);
        font-weight: 700;
      }

      .btn.active {
        color: #fff;
        background: var(--accent-2);
        border-color: rgba(215, 63, 49, 0.9);
      }

      [hidden] {
        display: none !important;
      }

      .wall {
        min-height: 0;
        padding: 0.75rem;
        display: grid;
        gap: 0.75rem;
        align-content: center;
        align-items: center;
      }

      .wall.layout-focus {
        grid-template-columns: minmax(0, 1.35fr) minmax(0, 1fr);
        grid-auto-rows: minmax(0, 1fr);
      }

      .layout-focus .feed.active {
        grid-row: span 2;
      }

      .wall.layout-equal {
        grid-template-columns: repeat(var(--cols, 3), minmax(0, 1fr));
        justify-items: center;
        align-content: center;
        align-items: center;
        grid-auto-rows: minmax(0, 1fr);
      }

      .wall.layout-equal.count-1 {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
      }

      .wall.layout-equal.count-2 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: 1fr;
      }

      .wall.layout-equal.count-3 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: 1fr;
      }

      .wall.layout-equal.count-4 {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
      }

      .wall.layout-equal.count-6 {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: repeat(2, minmax(0, 1fr));
      }

      .wall.layout-stack {
        grid-template-columns: 1fr;
        grid-template-rows: repeat(var(--count, 3), minmax(0, 1fr));
      }

      .feed {
        position: relative;
        min-width: 0;
        min-height: 0;
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 0.5rem;
        background: #050806;
        box-shadow: 0 1.2rem 3rem rgba(0, 0, 0, 0.34);
        aspect-ratio: 16 / 9;
        max-height: calc(100vh - 6rem);
      }

      .wall.layout-equal .feed {
        width: min(100%, var(--feed-width, 100%));
        height: var(--feed-height, auto);
        aspect-ratio: auto;
        max-height: none;
      }

      .feed.active {
        border-color: rgba(242, 193, 78, 0.86);
        box-shadow:
          0 0 0 1px rgba(242, 193, 78, 0.2),
          0 1.2rem 3rem rgba(0, 0, 0, 0.34);
      }

      .feed.fill .overlay-note {
        color: rgba(255, 255, 255, 0.92);
        border-color: rgba(242, 193, 78, 0.42);
        background: rgba(14, 14, 10, 0.72);
      }

      .feed-head {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 0.6rem;
        align-items: center;
        padding: 0.55rem 0.65rem;
        background: linear-gradient(90deg, rgba(23, 35, 29, 0.96), rgba(12, 18, 15, 0.96));
        border-bottom: 1px solid var(--line);
      }

      .title-group {
        min-width: 0;
        display: flex;
        align-items: center;
        gap: 0.55rem;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 1.75rem;
        height: 1.75rem;
        flex: 0 0 auto;
        border-radius: 0.35rem;
        color: #1d1300;
        background: var(--accent);
        font-weight: 800;
      }

      .feed-title {
        min-width: 0;
      }

      .feed-title strong,
      .feed-title span {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .feed-title strong {
        font-size: 0.95rem;
      }

      .feed-title span {
        margin-top: 0.1rem;
        color: var(--muted);
        font-size: 0.78rem;
      }

      .feed-actions {
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .feed-actions input {
        width: 4.6rem;
        height: 2rem;
        padding: 0 0.5rem;
        color: var(--text);
        border: 1px solid var(--line);
        border-radius: 0.35rem;
        background: #070b08;
        outline: 0;
      }

      .frame-wrap {
        position: relative;
        min-height: 0;
        background:
          linear-gradient(45deg, rgba(255, 255, 255, 0.04) 25%, transparent 25%),
          linear-gradient(-45deg, rgba(255, 255, 255, 0.04) 25%, transparent 25%),
          #020302;
        background-size: 1.4rem 1.4rem;
        overflow: hidden;
      }

      .wall.layout-equal .frame-wrap {
        height: var(--feed-video-height, auto);
      }

      iframe {
        display: block;
        position: absolute;
        top: var(--embed-top, 0);
        left: 50%;
        width: var(--embed-width, 100%);
        height: var(--embed-height, 100%);
        border: 0;
        background: #000;
        transform: translateX(-50%);
      }

      .overlay-note {
        position: absolute;
        left: 0.55rem;
        bottom: 0.55rem;
        max-width: calc(100% - 1.1rem);
        padding: 0.35rem 0.5rem;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 0.35rem;
        color: rgba(255, 255, 255, 0.82);
        background: rgba(0, 0, 0, 0.54);
        font-size: 0.72rem;
        line-height: 1.35;
        pointer-events: none;
      }

      .live-dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 50%;
        background: var(--good);
        box-shadow: 0 0 0 0.24rem rgba(66, 214, 146, 0.14);
      }

      svg {
        width: 1.1rem;
        height: 1.1rem;
        stroke: currentColor;
        stroke-width: 2;
        stroke-linecap: round;
        stroke-linejoin: round;
        fill: none;
      }

      @media (max-width: 980px) {
        body {
          overflow: auto;
        }

        .app {
          min-height: 100%;
          height: auto;
        }

        .toolbar {
          grid-template-columns: 1fr;
          position: sticky;
          top: 0;
          z-index: 10;
        }

        .brand {
          align-items: center;
          justify-content: space-between;
        }

        .controls {
          justify-content: flex-start;
        }

        .wall,
        .wall.layout-focus,
        .wall.layout-equal,
        .wall.layout-stack {
          min-height: calc(100vh - 7.4rem);
          grid-template-columns: 1fr;
          grid-template-rows: repeat(var(--count, 3), minmax(18rem, 70vh));
        }

        .layout-focus .feed:first-child {
          grid-row: auto;
        }
      }

      @media (max-width: 560px) {
        .toolbar,
        .wall {
          padding: 0.5rem;
        }

        .controls {
          display: grid;
          grid-template-columns: repeat(2, minmax(0, 1fr));
          width: 100%;
        }

        .field,
        .btn {
          width: 100%;
        }

        .field {
          grid-column: span 2;
        }

        .field input {
          width: 100%;
        }

        .feed-head {
          grid-template-columns: 1fr;
        }

        .feed-actions {
          justify-content: space-between;
        }

        .feed-actions input {
          width: 5.4rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <header class="toolbar">
        <div class="brand">
          <h1>苏超多路直播墙</h1>
          <div class="status" id="status">官方赛事页嵌入显示</div>
        </div>
        <div class="controls">
          <label class="field advanced-field">
            <span>起始场次</span>
            <input id="idsInput" inputmode="numeric" aria-label="起始场次 ID" />
          </label>
          <label class="field">
            <span>场数</span>
            <select id="countInput" aria-label="比赛场数">
              <option value="1">1场</option>
              <option value="2">2场</option>
              <option value="3" selected>3场</option>
              <option value="4">4场</option>
              <option value="6">6场</option>
            </select>
          </label>
          <label class="field advanced-field">
            <span>轮次</span>
            <input id="turnInput" inputmode="numeric" aria-label="轮次 ID" />
          </label>
          <label class="field source-field">
            <span>视频源</span>
            <input id="sourceInput" aria-label="视频源模板，可使用 {turnId} 和 {scheduleId}" />
          </label>
          <button class="btn primary" id="applyBtn" type="button">应用</button>
          <button class="btn" data-layout="focus" type="button">主画面</button>
          <button class="btn active" data-layout="equal" type="button">自动网格</button>
          <button class="btn" data-layout="stack" type="button">纵向</button>
        </div>
      </header>

      <section class="wall layout-equal" id="wall" aria-label="多场比赛直播画面"></section>
    </main>

    <script>
      (function installOfficialBannerCleaner() {
        const bannerText = /荔枝新闻|下载|打开\s*APP|打开\s*App|打开\s*app/;

        function setImportantStyle(element, property, value) {
          if (
            element.style.getPropertyValue(property) === value &&
            element.style.getPropertyPriority(property) === "important"
          ) {
            return;
          }
          element.style.setProperty(property, value, "important");
        }

        function resetPageOffset() {
          setImportantStyle(document.documentElement, "padding-top", "0");
          setImportantStyle(document.documentElement, "margin-top", "0");
          setImportantStyle(document.body, "padding-top", "0");
          setImportantStyle(document.body, "margin-top", "0");
        }

        function hideElement(element) {
          setImportantStyle(element, "display", "none");
          setImportantStyle(element, "height", "0");
          setImportantStyle(element, "min-height", "0");
          setImportantStyle(element, "overflow", "hidden");
        }

        function cleanOfficialBanner() {
          resetPageOffset();
          Array.from(document.body.children).forEach((element) => {
            if (element.classList.contains("app")) return;
            const rect = element.getBoundingClientRect();
            const text = element.textContent || "";
            const isTopBanner = rect.top <= 90 && rect.height <= 140 && rect.width >= window.innerWidth * 0.72;
            if (isTopBanner && bannerText.test(text)) hideElement(element);
          });
        }

        cleanOfficialBanner();
        window.cleanOfficialBanner = cleanOfficialBanner;
        new MutationObserver(cleanOfficialBanner).observe(document.body, {
          childList: true,
          attributes: true,
          attributeFilter: ["class", "style"],
        });
        window.addEventListener("load", cleanOfficialBanner);
        window.addEventListener("resize", cleanOfficialBanner);
      })();
    </script>
    <script src="https://m.jstv.com/common/config.js"></script>
    <script src="https://m.jstv.com/h5/2026superjsleague/store/cm.js"></script>
    <script>
      const defaultSourceTemplate = "https://m.jstv.com/h5/2026superjsleague/wap/index.html?turnId={turnId}&scheduleId={scheduleId}";
      const baseApi = "https://js-football-2026-lizhi.jstv.com/api/footballLeague/";
      const params = new URLSearchParams(window.location.search);
      const shouldAutoDetect =
        !params.has("ids") && !params.has("scheduleId") && !params.has("startId") && !params.has("count");
      const state = {
        turnId: params.get("turnId") || "200",
        ids: parseIds(),
        layout: params.get("layout") || "equal",
        focus: Number(params.get("focus") || 0),
        sourceTemplate: params.get("source") || defaultSourceTemplate,
        cropTop: Number(params.get("cropTop") || 0),
      };

      function parseIds() {
        const idsParam = params.get("ids");
        if (idsParam) {
          const ids = idsParam.split(",").map((id) => id.trim()).filter(Boolean);
          return normalizeIds(ids);
        }

        const first = params.get("scheduleId") || params.get("startId") || "41";
        const firstNumber = Number(first);
        const count = normalizeCount(params.get("count") || "3");
        if (Number.isFinite(firstNumber)) {
          return generateIds(firstNumber, count);
        }
        return ["41", "42", "43"];
      }

      function normalizeCount(value) {
        const count = Number(value);
        return [1, 2, 3, 4, 6].includes(count) ? count : 3;
      }

      function generateIds(start, count) {
        return Array.from({ length: count }, (_, index) => String(start + index));
      }

      function statusText(text) {
        document.getElementById("status").textContent = text;
      }

      function normalizeIds(ids) {
        const normalized = ids.map((id) => id.trim()).filter(Boolean).slice(0, 6);
        if (!normalized.length) return ["41", "42", "43"];

        if (normalized.length === 5) {
          const last = Number(normalized[normalized.length - 1]);
          normalized.push(Number.isFinite(last) ? String(last + 1) : normalized[normalized.length - 1]);
        }

        return normalized;
      }

      function sourceFor(scheduleId) {
        return state.sourceTemplate
          .replaceAll("{turnId}", encodeURIComponent(state.turnId))
          .replaceAll("{scheduleId}", encodeURIComponent(scheduleId));
      }

      function trackEvent(name, params = {}) {
        if (typeof window.gtag !== "function") return;
        window.gtag("event", name, {
          turn_id: state.turnId,
          match_ids: state.ids.join(","),
          match_count: state.ids.length,
          layout: state.layout,
          ...params,
        });
      }

      function gridColumns(count) {
        if (count === 1) return 1;
        if (count === 2) return 2;
        if (count === 4) return 2;
        return 3;
      }

      function renderFeeds() {
        const wall = document.getElementById("wall");
        if (!supportsFocusLayout() && state.layout === "focus") state.layout = "equal";
        wall.style.setProperty("--count", String(state.ids.length));
        wall.style.setProperty("--cols", String(gridColumns(state.ids.length)));
        wall.innerHTML = state.ids.map((id, index) => feedTemplate(id, index)).join("");

        document.getElementById("idsInput").value = state.ids[0] || "41";
        document.getElementById("countInput").value = String(normalizeCount(state.ids.length));
        document.getElementById("turnInput").value = state.turnId;
        document.getElementById("sourceInput").value = state.sourceTemplate;
        document.getElementById("status").textContent =
          `当前轮次 ${state.turnId}，${state.ids.length} 场完整显示：${state.ids.join(" / ")}`;

        observeFrames();
        updateLayoutControls();
        requestAnimationFrame(resizeLiveWindows);
        updateUrl();
      }

      function feedTemplate(id, index) {
        const canFocus = supportsFocusLayout();
        const title = canFocus && index === state.focus ? "主直播" : `第 ${index + 1} 路`;
        const active = canFocus && index === state.focus ? " active" : "";
        const focusButton = canFocus
          ? `
                <button class="icon-btn" data-action="focus" data-index="${index}" type="button" title="设为主画面">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M8 3H5a2 2 0 0 0-2 2v3" /><path d="M16 3h3a2 2 0 0 1 2 2v3" /><path d="M8 21H5a2 2 0 0 1-2-2v-3" /><path d="M16 21h3a2 2 0 0 0 2-2v-3" /></svg>
                </button>`
          : "";
        return `
          <article class="feed${active}" data-index="${index}">
            <div class="feed-head">
              <div class="title-group">
                <span class="badge">${index + 1}</span>
                <span class="live-dot" aria-hidden="true"></span>
                <div class="feed-title">
                  <strong>${title}</strong>
                  <span>turnId=${state.turnId} / scheduleId=${id}</span>
                </div>
              </div>
              <div class="feed-actions">
                <input data-slot="${index}" value="${id}" inputmode="numeric" aria-label="第 ${index + 1} 路场次 ID" />
                ${focusButton}
                <button class="icon-btn" data-action="reload" data-index="${index}" type="button" title="刷新">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16" /><path d="M3 21v-5h5" /><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8" /><path d="M21 3v5h-5" /></svg>
                </button>
                <button class="icon-btn" data-action="fit" data-index="${index}" type="button" title="区域内全屏 / 完整显示">
                  <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M15 3h6v6" /><path d="M9 21H3v-6" /><path d="M21 3l-7 7" /><path d="M3 21l7-7" /></svg>
                </button>
              </div>
            </div>
            <div class="frame-wrap">
              <iframe id="frame-${index}" data-index="${index}" data-schedule-id="${id}" src="${sourceFor(id)}" allow="autoplay; encrypted-media; picture-in-picture" title="第 ${index + 1} 路直播"></iframe>
              <div class="overlay-note">完整显示直播画面</div>
            </div>
          </article>
        `;
      }

      function setLayout(layout) {
        if (layout === "focus" && !supportsFocusLayout()) layout = "equal";
        const changed = state.layout !== layout;
        state.layout = layout;
        const wall = document.getElementById("wall");
        wall.className = `wall layout-${layout} count-${state.ids.length}`;
        wall.style.setProperty("--count", String(state.ids.length));
        wall.style.setProperty("--cols", String(gridColumns(state.ids.length)));
        updateLayoutControls();
        requestAnimationFrame(resizeLiveWindows);
        updateUrl();
        if (changed) {
          trackEvent("change_layout", { selected_layout: layout });
        }
      }

      function setFocus(index) {
        if (!supportsFocusLayout()) return;
        const wall = document.getElementById("wall");
        const selected = document.querySelector(`.feed[data-index="${index}"]`);
        if (!selected) return;
        state.focus = index;
        wall.insertBefore(selected, wall.firstElementChild);
        document.querySelectorAll(".feed").forEach((feed) => feed.classList.toggle("active", feed === selected));
        setLayout("focus");
        trackEvent("focus_match", {
          schedule_id: state.ids[index],
          match_index: index,
        });
      }

      function applyFromInputs() {
        const start = Number(document.getElementById("idsInput").value.trim() || state.ids[0] || 41);
        const count = normalizeCount(document.getElementById("countInput").value);
        state.ids = Number.isFinite(start)
          ? generateIds(start, count)
          : normalizeIds(Array.from(document.querySelectorAll("[data-slot]")).map((input) => input.value.trim()));
        state.focus = Math.min(state.focus, state.ids.length - 1);
        state.turnId = document.getElementById("turnInput").value.trim() || "200";
        state.sourceTemplate = document.getElementById("sourceInput").value.trim() || defaultSourceTemplate;
        renderFeeds();
        setLayout("equal");
        trackEvent("apply_matches");
      }

      function applySlotInputs() {
        state.ids = normalizeIds(Array.from(document.querySelectorAll("[data-slot]")).map((input) => input.value.trim()));
        state.focus = Math.min(state.focus, state.ids.length - 1);
        state.sourceTemplate = document.getElementById("sourceInput").value.trim() || defaultSourceTemplate;
        renderFeeds();
        setLayout(state.layout);
        trackEvent("apply_matches", { input_mode: "manual_slots" });
      }

      function reloadFrame(index) {
        const frame = document.getElementById(`frame-${index}`);
        if (!frame) return;
        frame.src = sourceFor(state.ids[index]);
        trackEvent("reload_match", {
          schedule_id: state.ids[index],
          match_index: index,
        });
      }

      function toggleFit(index) {
        const feed = document.querySelector(`.feed[data-index="${index}"]`);
        if (!feed) return;
        const isFill = feed.classList.toggle("fill");
        const note = feed.querySelector(".overlay-note");
        if (note) note.textContent = isFill ? "区域内全屏显示" : "完整显示直播画面";
        resizeLiveWindows();
        trackEvent("toggle_fit", {
          schedule_id: state.ids[index],
          match_index: index,
          fit_mode: isFill ? "fill" : "contain",
        });
      }

      function gridRows(count) {
        if (state.layout === "stack") return count;
        if (count === 1 || count === 2 || count === 3) return 1;
        return 2;
      }

      function supportsFocusLayout() {
        return state.ids.length <= 3;
      }

      function updateLayoutControls() {
        document.querySelectorAll("[data-layout]").forEach((button) => {
          const isFocus = button.dataset.layout === "focus";
          button.hidden = isFocus && !supportsFocusLayout();
          button.disabled = button.hidden;
          button.classList.toggle("active", button.dataset.layout === state.layout && !button.hidden);
        });
      }

      function resizeLiveWindows() {
        sizeFeedCards();
        fitFramesToCells();
      }

      function sizeFeedCards() {
        const wall = document.getElementById("wall");
        if (!wall || state.layout !== "equal") {
          wall?.style.removeProperty("--feed-width");
          wall?.style.removeProperty("--feed-height");
          wall?.style.removeProperty("--feed-video-height");
          return;
        }

        const rect = wall.getBoundingClientRect();
        if (!rect.width || !rect.height) return;

        const styles = window.getComputedStyle(wall);
        const colGap = Number.parseFloat(styles.columnGap) || 0;
        const rowGap = Number.parseFloat(styles.rowGap) || 0;
        const cols = gridColumns(state.ids.length);
        const rows = gridRows(state.ids.length);
        const cellWidth = (rect.width - colGap * (cols - 1)) / cols;
        const cellHeight = (rect.height - rowGap * (rows - 1)) / rows;
        const headerHeights = Array.from(document.querySelectorAll(".feed-head")).map((head) =>
          head.getBoundingClientRect().height,
        );
        const headerHeight = Math.max(44, ...headerHeights);
        const maxVideoHeight = Math.max(120, cellHeight - headerHeight);
        const videoHeight = Math.min(cellWidth * 9 / 16, maxVideoHeight);
        const feedWidth = Math.min(cellWidth, videoHeight * 16 / 9);
        const feedHeight = headerHeight + videoHeight;

        wall.style.setProperty("--feed-width", `${Math.floor(feedWidth)}px`);
        wall.style.setProperty("--feed-height", `${Math.floor(feedHeight)}px`);
        wall.style.setProperty("--feed-video-height", `${Math.floor(videoHeight)}px`);
      }

      function fitFramesToCells() {
        document.querySelectorAll(".frame-wrap").forEach((wrap) => {
          const rect = wrap.getBoundingClientRect();
          if (!rect.width || !rect.height) return;
          const isFill = wrap.closest(".feed")?.classList.contains("fill");
          const videoWidthForHeight = rect.height * 16 / 9;
          const embedWidth = isFill ? Math.max(rect.width, videoWidthForHeight) : Math.min(rect.width, videoWidthForHeight);
          const cropTop = state.sourceTemplate === defaultSourceTemplate ? state.cropTop : 0;
          const embedHeight = Math.max(rect.height + cropTop, embedWidth * 1.8);
          wrap.style.setProperty("--embed-width", `${Math.ceil(embedWidth)}px`);
          wrap.style.setProperty("--embed-height", `${Math.ceil(embedHeight)}px`);
          wrap.style.setProperty("--embed-top", `${-cropTop}px`);
        });
      }

      function updateUrl() {
        const next = new URL(window.location.href);
        next.searchParams.set("turnId", state.turnId);
        next.searchParams.set("ids", state.ids.join(","));
        next.searchParams.set("scheduleId", state.ids[0] || "41");
        next.searchParams.set("count", String(state.ids.length));
        next.searchParams.set("layout", state.layout);
        next.searchParams.set("focus", String(state.focus));
        if (state.sourceTemplate === defaultSourceTemplate) {
          next.searchParams.delete("source");
        } else {
          next.searchParams.set("source", state.sourceTemplate);
        }
        window.history.replaceState(null, "", next);
      }

      async function autoDetectTodayMatches() {
        statusText("正在检查今天赛程...");
        try {
          const result = await fetchTodayMatches();
          if (!result.ids.length) {
            statusText(`未检测到今日比赛，默认显示 ${state.ids.length} 场：${state.ids.join(" / ")}`);
            trackEvent("auto_today_matches_empty");
            return;
          }

          state.turnId = String(result.turnId);
          state.ids = result.ids;
          state.focus = 0;
          renderFeeds();
          setLayout("equal");
          statusText(`已自动匹配今日 ${state.ids.length} 场：${state.ids.join(" / ")}`);
          trackEvent("auto_today_matches", {
            detected_count: state.ids.length,
            detected_turn_id: state.turnId,
          });
        } catch (error) {
          console.warn("自动检查今日赛程失败", error);
          statusText(`今日赛程检查失败，默认显示 ${state.ids.length} 场：${state.ids.join(" / ")}`);
          trackEvent("auto_today_matches_failed", {
            error_message: String(error).slice(0, 120),
          });
        }
      }

      async function fetchTodayMatches() {
        if (!window.cm || typeof window.cm.get !== "function") {
          throw new Error("official schedule helper unavailable");
        }

        const turnRes = await window.cm.get(`${baseApi}getCompetitionTurnList`);
        if (!turnRes || turnRes.code !== 200 || !Array.isArray(turnRes.data)) {
          throw new Error("turn list unavailable");
        }

        const turns = orderTurns(turnRes.data);
        for (const turn of turns) {
          const scheduleRes = await window.cm.get(`${baseApi}getCompetitionScheduleList?turnId=${turn.turnId}`);
          if (!scheduleRes || scheduleRes.code !== 200 || !Array.isArray(scheduleRes.data)) continue;
          const today = scheduleRes.data.filter(isTodaySchedule);
          if (today.length) {
            return {
              turnId: turn.turnId,
              ids: normalizeIds(today.map((item) => String(item.scheduleId)).filter(Boolean)),
            };
          }
        }

        return { turnId: state.turnId, ids: [] };
      }

      function orderTurns(turns) {
        return [...turns].sort((a, b) => {
          if (String(a.turnId) === String(state.turnId)) return -1;
          if (String(b.turnId) === String(state.turnId)) return 1;
          if (Number(a.isDefault) === 1) return -1;
          if (Number(b.isDefault) === 1) return 1;
          return 0;
        });
      }

      function isTodaySchedule(schedule) {
        const today = new Date();
        const todayIso = formatDate(today, "-");
        const todaySlash = formatDate(today, "/");
        const todayCn = `${today.getMonth() + 1}月${today.getDate()}日`;

        for (const [key, value] of Object.entries(schedule)) {
          if (!/(time|date|begin|start)/i.test(key)) continue;
          if (value == null) continue;

          const raw = String(value);
          if (raw.includes(todayIso) || raw.includes(todaySlash) || raw.includes(todayCn)) return true;

          const timestamp = parseScheduleTime(value);
          if (!timestamp) continue;
          const date = new Date(timestamp);
          if (formatDate(date, "-") === todayIso) return true;
        }

        return false;
      }

      function formatDate(date, separator) {
        const month = String(date.getMonth() + 1).padStart(2, "0");
        const day = String(date.getDate()).padStart(2, "0");
        return `${date.getFullYear()}${separator}${month}${separator}${day}`;
      }

      function parseScheduleTime(value) {
        if (typeof value === "number") {
          if (value > 1e12) return value;
          if (value > 1e9) return value * 1000;
          return 0;
        }

        const text = String(value).trim();
        if (/^\d{13}$/.test(text)) return Number(text);
        if (/^\d{10}$/.test(text)) return Number(text) * 1000;

        const parsed = Date.parse(text.replace(/-/g, "/"));
        return Number.isNaN(parsed) ? 0 : parsed;
      }

      document.getElementById("applyBtn").addEventListener("click", applyFromInputs);
      document.getElementById("idsInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") applyFromInputs();
      });
      document.getElementById("turnInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") applyFromInputs();
      });
      document.getElementById("sourceInput").addEventListener("keydown", (event) => {
        if (event.key === "Enter") applyFromInputs();
      });
      document.getElementById("countInput").addEventListener("change", applyFromInputs);

      document.querySelectorAll("[data-layout]").forEach((button) => {
        button.addEventListener("click", () => setLayout(button.dataset.layout));
      });

      document.getElementById("wall").addEventListener("click", (event) => {
        const button = event.target.closest("[data-action]");
        if (!button) return;
        const index = Number(button.dataset.index);
        if (button.dataset.action === "focus") setFocus(index);
        if (button.dataset.action === "reload") reloadFrame(index);
        if (button.dataset.action === "fit") toggleFit(index);
      });

      document.getElementById("wall").addEventListener("keydown", (event) => {
        if (event.key === "Enter" && event.target.matches("[data-slot]")) applySlotInputs();
      });

      document.getElementById("wall").addEventListener(
        "load",
        (event) => {
          if (!event.target.matches("iframe")) return;
          trackEvent("live_frame_loaded", {
            schedule_id: event.target.dataset.scheduleId,
            match_index: Number(event.target.dataset.index),
          });
        },
        true,
      );

      const observer = new ResizeObserver(() => resizeLiveWindows());
      function observeFrames() {
        observer.disconnect();
        document.querySelectorAll(".frame-wrap").forEach((wrap) => observer.observe(wrap));
      }
      window.addEventListener("resize", resizeLiveWindows);
      window.addEventListener("resize", () => window.cleanOfficialBanner?.());

      setLayout(["focus", "equal", "stack"].includes(state.layout) ? state.layout : "equal");
      state.focus = Math.min(Math.max(state.focus, 0), state.ids.length - 1);
      renderFeeds();
      if (state.layout === "focus") setFocus(state.focus);
      resizeLiveWindows();
      window.cleanOfficialBanner?.();
      trackEvent("live_wall_ready");
      if (shouldAutoDetect) autoDetectTodayMatches();
    </script>
  </body>
</html>
